{% extends "base.html" %}
{% block title %}غير موجود{% endblock %}
{% block content %}
<div class="wrap error-page">
  <h1 class="error-code">٤٠٤</h1>
  <p class="text-muted">الصفحة غير موجودة في الحصن.</p>
  <div class="error-actions mt-lg">
    <a href="/" class="btn btn-gold">العودة للرئيسية</a>
    {% if current_user and current_user.status == 'active' %}
    <a href="/library" class="btn btn-outline">مكتبة الوعي</a>
    {% endif %}
  </div>
</div>
{% endblock %}
